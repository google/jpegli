name: Check sync with upstream jpegli

on:
  schedule:
    # Runs every day at 03:00 UTC; adjust as needed
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/google/jpegli.git
          git fetch --no-tags --prune --prune-tags origin
          git fetch --no-tags --prune --prune-tags upstream

      - name: Compare origin/main with upstream/main (excluding workflows and README)
        run: |
          # Compare the two branches while excluding .github/workflows and README.md
          # If they are identical (except for those paths), exit successfully.

          if git diff --quiet origin/main upstream/main -- . ':(exclude).github/workflows' ':(exclude)README.md'; then
            echo "Repository is in sync with upstream google/jpegli (excluding .github/workflows and README.md)."
          else
            echo "::error::Repository is OUT OF SYNC with upstream google/jpegli (excluding .github/workflows and README.md)." 
            echo ""
            echo "Summary of differences between origin/main and upstream/main (excluding .github/workflows and README.md):"
            git diff --stat origin/main upstream/main -- . ':(exclude).github/workflows' ':(exclude)README.md' || true
            echo ""
            echo "To sync manually, run these commands locally (or in a one-off workflow):"
            echo "  git fetch origin upstream"
            echo "  git checkout -B sync-upstream upstream/main"
            echo "  git checkout origin/main -- .github/workflows || true"
            echo "  git checkout origin/main -- README.md || true"
            echo "  git status"
            echo "  # If everything looks good:"
            echo "  git commit -am 'Sync with upstream google/jpegli'"
            echo "  git push origin sync-upstream:main"
            exit 1
          fi
